name: Tron balances refresh

on:
  schedule:
    - cron: '30 3 * * 1' # 매주 월요일 03:30 UTC (cron 에서 뺀 Tron 잔액 채우기)
  workflow_dispatch:

jobs:
  balances:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Refetch Tron zero balances
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/refetch-zero-balances.mjs
