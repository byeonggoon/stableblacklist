name: Tron balances refresh

on:
  schedule:
    - cron: '30 3 * * *' # 매일 03:30 UTC (신규 동결 급증분 잔액을 하루 내 채움)
  workflow_dispatch:

jobs:
  balances:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Refetch Tron zero balances
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/refetch-zero-balances.mjs
