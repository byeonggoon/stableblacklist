name: StableBlacklist Sync

# 무료로 "계속 업데이트": 배포된 /api/cron/sync 를 주기적으로 호출.
# (Vercel Hobby cron 은 하루 1회 제한이라 잦은 갱신은 GitHub Actions 로 처리)
on:
  schedule:
    - cron: '*/15 * * * *' # 약 15분마다 (GitHub Actions 스케줄은 지연될 수 있음)
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger indexer sync
        run: |
          curl -sS -X GET "${{ secrets.DEPLOY_URL }}/api/cron/sync" \
            -H "authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120 --fail-with-body
